name: 📊 Daily Data Pipeline (Kimi 2.6 Multi-Agent)

on:
  schedule:
    - cron: '5 10 * * 1-5'  # UTC 10:05 = 北京时间 18:05（夏令时）
  workflow_dispatch:

jobs:
  data-pipeline:
    name: 🧠 Kimi 2.6 Multi-Agent Data Pipeline
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install -r scripts/requirements.txt

      - name: Run daily pipeline
        env:
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          KIMI_BASE_URL: https://api.kimi.com/coding/v1
          KIMI_MODEL: kimi-2.6
        run: python scripts/run_pipeline.py --stage all --ci

      - name: Commit and push
        run: |
          git config user.name "kimi-bot[agent]"
          git config user.email "kimi-bot@users.noreply.github.com"
          git add public/data/ src/constants/
          git diff --cached --quiet || git commit -m "📊 Daily: $(date +%Y-%m-%d) [Kimi Agent]"
          git push
